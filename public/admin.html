<!DOCTYPE html>
<html>
<head>
  <title>Panel Admin</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }
    h1 {
      color: #333;
    }
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      flex: 1;
      text-align: center;
    }
    .card h2 {
      margin: 0;
      font-size: 30px;
    }
    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    button {
      padding: 10px 15px;
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Panel de Administración 🚀</h1>

  <div class="cards">
    <div class="card">
      <h3>Total Servicios</h3>
      <h2 id="totalServicios">0</h2>
    </div>

    <div class="card">
      <h3>Total Clientes</h3>
      <h2 id="totalClientes">0</h2>
    </div>

    <div class="card">
      <h3>Ingresos Totales</h3>
      <h2 id="totalIngresos">$0</h2>
    </div>
  </div>

  <h2>Últimos Servicios</h2>

  <table>
    <thead>
      <tr>
        <th>Cliente</th>
        <th>Estado</th>
        <th>Fecha</th>
        <th>Precio</th>
      </tr>
    </thead>
    <tbody id="tablaServicios">
    </tbody>
  </table>

  <br>
  <a href="/logout">
    <button>Cerrar sesión</button>
  </a>

</body>
</html>
